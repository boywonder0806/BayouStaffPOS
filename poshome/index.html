<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>POS Home</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: rgb(22, 54, 155);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      gap: 3rem;
    }

    h1 {
      color: #ffffff;
      font-size: 1.75rem;
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    .cards {
      display: flex;
      gap: 2.5rem;
      flex-wrap: wrap;
      justify-content: center;
      padding: 0 1.5rem;
    }

    .card {
      background: #ffffff;
      border-radius: 20px;
      padding: 2.5rem 3rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
      text-decoration: none;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      min-width: 220px;
    }

    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 48px rgba(0, 0, 0, 0.35);
    }

    .card:active {
      transform: translateY(-4px);
    }

    .logo-wrap {
      width: 110px;
      height: 110px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-wrap img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .card-label {
      font-size: 1rem;
      font-weight: 700;
      color: #1a1a2e;
      text-align: center;
      letter-spacing: 0.01em;
    }
  </style>
</head>
<body>

  <h1>Staff Portal</h1>

  <div class="cards">

    <a class="card"
       href="https://secure.rocket-rez.com/RocketOffice/"
       target="_blank"
       rel="noopener noreferrer">
      <div class="logo-wrap">
        <img
          src="https://logo.clearbit.com/rocket-rez.com"
          alt="RocketRez logo"
          onerror="this.onerror=null;this.src='https://www.google.com/s2/favicons?domain=rocket-rez.com&sz=128';"
        />
      </div>
      <span class="card-label">RocketRez POS</span>
    </a>

    <a class="card"
       href="https://app-production.smartwaiver.com/login"
       target="_blank"
       rel="noopener noreferrer">
      <div class="logo-wrap">
        <img
          src="https://logo.clearbit.com/smartwaiver.com"
          alt="SmartWaiver logo"
          onerror="this.onerror=null;this.src='https://www.google.com/s2/favicons?domain=smartwaiver.com&sz=128';"
        />
      </div>
      <span class="card-label">SmartWaiver</span>
    </a>

  </div>

</body>
</html>
